<!DOCTYPE html>

<html lang="pt-BR">

<head>

  <meta charset="UTF-8">

  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>AP — MODO RESENHA</title>

  <style>

    body {

      background: #0f1115;

      margin: 0;

      display: flex;

      justify-content: center;

      align-items: center;

      height: 100vh;

      overflow: hidden;

      flex-direction: column;

      color: #7c6cff;

      font-family: Arial, sans-serif;

    }



    .meme-container {

      perspective: 1000px;

    }



    .meme-img {

      width: 300px;

      border-radius: 20px;

      box-shadow: 0 0 50px rgba(124, 108, 255, 0.5);

      animation: zoeira-extrema 3s infinite ease-in-out;

    }



    @keyframes zoeira-extrema {

      0% { 

        transform: rotate(0deg) scale(1) translateZ(0); 

      }

      25% { 

        transform: rotate(90deg) scale(1.8) translateZ(100px); 

      }

      50% { 

        transform: rotate(180deg) scale(0.3) translateZ(-200px); 

      }

      75% { 

        transform: rotate(270deg) scale(2) translateZ(150px); 

      }

      100% { 

        transform: rotate(360deg) scale(1) translateZ(0); 

      }

    }



    h1 {

      margin-top: 50px;

      text-shadow: 0 0 20px #7c6cff;

      letter-spacing: 5px;

    }

  </style>

</head>

<body>



  <div class="meme-container">

    <img src="https://pt.quizur.com/_image?href=https%3A%2F%2Fstatic.quizur.com%2Fi%2Fb%2F592f3eaf4b9f21.66344098libdmax.png&w=600&h=600&f=webp" class="meme-img">

  </div>



  <h1>TOLLLLLLLLLLLLL</h1>

  <h1>NIGGGGGGGGGA</h1>



</body>

</html>
