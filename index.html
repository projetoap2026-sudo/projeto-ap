<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Neon AP — Inteligência Avançada</title>
    <style>
        :root {
            color-scheme: dark;
            --bg-primary: #040507;
            --bg-secondary: #0a0b10;
            --bg-input: #010203;
            --accent-color: #7d5fff;
            --accent-glow: #6c5ce7;
            --text-main: #ffffff;
            --text-muted: #8a9cb1;
            --border-ui: #1a1e28;
            --error-ui: #ff5252;
            --google-icon-svg: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" width="48px" height="48px"><path fill="#FFC107" d="M43.611,20.071H42V20H24v8h11.303c-1.649,4.657-6.08,8-11.303,8c-6.627,0-12-5.373-12-12c0-6.627,5.373-12,12-12c3.059,0,5.842,1.154,7.961,3.039l5.657-5.657C34.046,6.053,29.268,4,24,4C12.955,4,4,12.955,4,24s8.955,20,20,20s20-8.955,20-20C44,22.659,43.862,21.35,43.611,20.071z"/><path fill="#FF3D00" d="M6.306,14.691l6.571,4.819C14.655,15.108,18.961,12,24,12c3.059,0,5.842,1.154,7.961,3.039l5.657-5.657C34.046,6.053,29.268,4,24,4C16.318,4,9.656,8.337,6.306,14.691z"/><path fill="#4CAF50" d="M24,44c5.166,0,9.86-1.977,13.409-5.192l-6.19-5.238C29.211,35.091,26.715,36,24,36c-5.202,0-9.619-3.317-11.283-7.946l-6.522,5.025C9.505,39.556,16.227,44,24,44z"/><path fill="#1976D2" d="M43.611,20.071H42V20H24v8h11.303c-0.792,2.237-2.231,4.166-4.087,5.571c0.001-0.001,0.002-0.001,0.003-0.002l6.19,5.238C36.971,39.205,44,34,44,24C44,22.659,43.862,21.35,43.611,20.071z"/></svg>');
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        body {
            background-color: var(--bg-primary);
            color: var(--text-main);
            overflow: hidden;
            width: 100vw;
            height: 100vh;
        }

        #splash-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: var(--bg-primary);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            flex-direction: column;
            opacity: 1;
            transition: opacity 1s ease-out;
        }

        #splash-logo {
            font-size: 80px;
            font-weight: 900;
            letter-spacing: -3px;
            color: #fff;
            text-shadow: 0 0 20px rgba(125, 95, 255, 0.7);
            animation: splashZoom 2.5s cubic-bezier(0.25, 1, 0.5, 1) forwards;
            opacity: 0;
        }

        #splash-name {
            font-size: 20px;
            font-weight: 500;
            color: var(--text-muted);
            margin-top: 15px;
            opacity: 0;
            animation: fadeIn 1s ease 1s forwards;
            letter-spacing: 2px;
        }

        @keyframes splashZoom {
            0% { transform: scale(0.1); opacity: 0; filter: blur(10px); }
            30% { transform: scale(1.1); opacity: 1; filter: blur(0px); }
            70% { transform: scale(1); opacity: 1; text-shadow: 0 0 35px var(--accent-glow); }
            100% { transform: scale(1.05); opacity: 0; filter: blur(5px); }
        }

        @keyframes fadeIn { to { opacity: 1; } }

        .container {
            display: flex;
            min-height: 100vh;
            justify-content: center;
            align-items: center;
            padding: 20px;
            position: absolute;
            width: 100%;
            opacity: 0;
            transform: scale(0.95);
            visibility: hidden;
        }

        .container.active {
            opacity: 1;
            transform: scale(1);
            visibility: visible;
        }

        .auth-card {
            background: var(--bg-secondary);
            width: 100%;
            max-width: 440px;
            padding: 50px;
            border-radius: 28px;
            border: 1px solid var(--border-ui);
            box-shadow: 0 30px 60px -15px rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(5px);
        }

        .auth-header {
            text-align: center;
            margin-bottom: 35px;
        }

        .auth-header h1 {
            font-size: 32px;
            font-weight: 900;
            letter-spacing: -1.5px;
            margin-bottom: 8px;
            color: #fff;
            text-shadow: 0 0 15px var(--accent-glow);
        }

        .auth-header p {
            color: var(--text-muted);
            font-size: 15px;
        }

        .social-buttons {
            display: flex;
            flex-direction: column;
            gap: 15px;
            margin-bottom: 28px;
        }

        .btn-social {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 14px;
            width: 100%;
            padding: 16px;
            border-radius: 14px;
            border: 1px solid var(--border-ui);
            background: var(--bg-input);
            color: var(--text-main);
            font-weight: 600;
            cursor: pointer;
            font-size: 15px;
            position: relative;
        }

        .btn-social:hover {
            border-color: rgba(125, 95, 255, 0.4);
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(0,0,0,0.3);
        }

        #btn-google::before {
            content: '';
            display: block;
            width: 18px;
            height: 18px;
            background-image: var(--google-icon-svg);
            background-size: contain;
            background-repeat: no-repeat;
        }

        .divider {
            display: flex;
            align-items: center;
            text-align: center;
            margin: 28px 0;
            color: var(--text-muted);
            font-size: 13px;
            text-transform: uppercase;
            letter-spacing: 1.5px;
        }

        .divider::before, .divider::after {
            content: '';
            flex: 1;
            border-bottom: 1px solid var(--border-ui);
        }

        .divider:not(:empty)::before { margin-right: 10px; }
        .divider:not(:empty)::after { margin-left: 10px; }

        .input-group {
            margin-bottom: 22px;
        }

        input {
            width: 100%;
            padding: 16px 18px;
            background: var(--bg-input);
            border: 1px solid var(--border-ui);
            border-radius: 14px;
            color: #fff;
            font-size: 16px;
        }

        input:focus {
            outline: none;
            border-color: var(--accent-color);
            box-shadow: 0 0 20px rgba(125, 95, 255, 0.2);
        }

        .btn-primary {
            width: 100%;
            padding: 18px;
            background: var(--accent-color);
            color: white;
            border: none;
            border-radius: 14px;
            font-weight: 700;
            font-size: 17px;
            cursor: pointer;
            box-shadow: 0 8px 15px rgba(125, 95, 255, 0.25);
        }

        .btn-primary:hover {
            background: #8e74f8;
            box-shadow: 0 12px 20px rgba(125, 95, 255, 0.35);
        }

        .btn-link {
            background: none;
            border: none;
            color: var(--accent-color);
            font-weight: 600;
            cursor: pointer;
            font-size: 15px;
        }

        #dashboard {
            flex-direction: column;
            padding: 0;
            height: 100vh;
        }

        .chat-container {
            display: flex;
            flex-direction: column;
            width: 100%;
            max-width: 1300px;
            height: 92vh;
            background: var(--bg-secondary);
            border-radius: 36px;
            border: 1px solid var(--border-ui);
            overflow: hidden;
            margin: auto;
            box-shadow: 0 40px 80px rgba(0,0,0,0.5);
        }

        .chat-header {
            padding: 25px 35px;
            background: rgba(10, 11, 16, 0.9);
            backdrop-filter: blur(15px);
            border-bottom: 1px solid var(--border-ui);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .chat-header h2 {
            font-size: 22px;
            font-weight: 800;
            letter-spacing: -0.5px;
        }

        #chat-log {
            flex: 1;
            padding: 35px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 24px;
            scroll-behavior: smooth;
        }

        .message {
            max-width: 70%;
            padding: 18px 22px;
            border-radius: 22px;
            line-height: 1.7;
            font-size: 16px;
        }

        .message-user {
            background: var(--accent-color);
            color: white;
            align-self: flex-end;
            border-bottom-right-radius: 5px;
        }

        .message-ai {
            background: var(--bg-input);
            border: 1px solid var(--border-ui);
            color: var(--text-main);
            align-self: flex-start;
            border-bottom-left-radius: 5px;
        }

        .chat-input-area {
            padding: 28px 35px;
            background: var(--bg-secondary);
            border-top: 1px solid var(--border-ui);
            display: flex;
            gap: 18px;
        }

        .chat-input-area input {
            flex: 1;
            border-radius: 18px;
        }

        .btn-send {
            width: auto;
            padding: 0 35px;
            margin: 0;
        }
    </style>
</head>
<body>

    <div id="splash-screen">
        <div id="splash-logo">AP</div>
        <div id="splash-name">NEON AP</div>
    </div>

    <div id="view-auth" class="container">
        <div class="auth-card">
            <div class="auth-header">
                <h1>Acesse o AP</h1>
                <p>O futuro está a um clique de distância.</p>
            </div>

            <div class="social-buttons">
                <button class="btn-social" id="btn-google">
                    Continuar com Google
                </button>
                <button class="btn-social" id="btn-facebook" style="border-color: #1877F2; color: #fff; background: #1877F2;">
                    <svg width="18" height="18" fill="currentColor" viewBox="0 0 24 24"><path d="M24 12.073c0-6.627-5.373-12-12-12s-12 5.373-12 12c0 5.99 4.388 10.954 10.125 11.854v-8.385H7.078v-3.47h3.047V9.43c0-3.007 1.792-4.669 4.533-4.669 1.312 0 2.686.235 2.686.235v2.953H15.83c-1.491 0-1.956.925-1.956 1.874v2.25h3.328l-.532 3.47h-2.796v8.385C19.612 23.027 24 18.062 24 12.073z"/></svg>
                    Continuar com Facebook
                </button>
            </div>

            <div class="divider">ou</div>

            <div id="form-login">
                <div class="input-group">
                    <input type="email" id="email-field" placeholder="Endereço de E-mail">
                </div>
                <div class="input-group">
                    <input type="password" id="pass-field" placeholder="Sua Senha Mestra">
                </div>
                <button class="btn-primary" id="btn-main-action">Acessar Sistema</button>
                <div style="text-align: center; margin-top: 25px;">
                    <button class="btn-link" onclick="toggleAuthMode()" id="toggle-text">Não possui conta? Registrar</button>
                </div>
            </div>
        </div>
    </div>

    <div id="view-dashboard" class="container">
        <div class="chat-container">
            <header class="chat-header">
                <div>
                    <h2 id="user-display-name">Carregando...</h2>
                    <span style="font-size: 13px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 1px;">Terminal de IA</span>
                </div>
                <button class="btn-link" onclick="handleLogout()" style="color: var(--error-ui); font-size: 14px;">Terminar Sessão</button>
            </header>

            <div id="chat-log">
                <div class="message message-ai">Sistema ativado. Eu sou o terminal NEON AP. Como posso processar suas requisições hoje?</div>
            </div>

            <div class="chat-input-area">
                <input type="text" id="ai-input" placeholder="Insira comando ou dúvida..." onkeypress="handleChatEnter(event)">
                <button class="btn-primary btn-send" onclick="processAIChat()">Enviar</button>
            </div>
        </div>
    </div>

    <script type="module">
        import { CONFIG } from './env.js';
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.11.0/firebase-app.js";
        import { 
            getAuth, 
            createUserWithEmailAndPassword, 
            signInWithEmailAndPassword, 
            GoogleAuthProvider, 
            FacebookAuthProvider, 
            signInWithPopup, 
            onAuthStateChanged, 
            signOut,
            sendEmailVerification
        } from "https://www.gstatic.com/firebasejs/10.11.0/firebase-auth.js";
        import { getDatabase, ref, set, get } from "https://www.gstatic.com/firebasejs/10.11.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: CONFIG.FIREBASE_KEY,
            authDomain: "ap-x-c062e.firebaseapp.com",
            databaseURL: "https://ap-x-c062e-default-rtdb.firebaseio.com",
            projectId: "ap-x-c062e",
            storageBucket: "ap-x-c062e.firebasestorage.app",
            messagingSenderId: "1069658318640",
            appId: "1:1069658318640:web:0c0798a171d838a6c34af5"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getDatabase(app);
        let isRegisterMode = false;

        const splashTimeout = new Promise(resolve => setTimeout(resolve, 2500));
        const authStatePromise = new Promise(resolve => onAuthStateChanged(auth, resolve));

        Promise.all([splashTimeout, authStatePromise]).then(([_, user]) => {
            const splash = document.getElementById('splash-screen');
            splash.style.opacity = '0';
            setTimeout(() => {
                splash.style.display = 'none';
                updateUIState(user);
            }, 1000);
        });

        const updateUIState = async (user) => {
            if (user && (user.emailVerified || user.providerData[0].providerId !== 'password')) {
                const snapshot = await get(ref(db, `usuarios/${user.uid}`));
                document.getElementById('user-display-name').innerText = snapshot.exists() ? `${snapshot.val().nome}` : `${user.displayName || 'Usuário Core'}`;
                switchView('view-dashboard');
            } else {
                switchView('view-auth');
            }
        };

        const switchView = (id) => {
            document.querySelectorAll('.container').forEach(v => v.classList.remove('active'));
            document.getElementById(id).classList.add('active');
        };

        window.toggleAuthMode = () => {
            isRegisterMode = !isRegisterMode;
            document.getElementById('btn-main-action').innerText = isRegisterMode ? 'Criar Conta Mestra' : 'Acessar Sistema';
            document.getElementById('toggle-text').innerText = isRegisterMode ? 'Já possui acesso? Login' : 'Não possui conta? Registrar';
        };

        const saveUserData = async (user) => {
            await set(ref(db, `usuarios/${user.uid}`), {
                uid: user.uid,
                email: user.email,
                nome: user.displayName || 'Operador',
                lastAccess: new Date().toISOString()
            });
        };

        document.getElementById('btn-main-action').onclick = async () => {
            const email = document.getElementById('email-field').value;
            const pass = document.getElementById('pass-field').value;
            if(!email || !pass) return;

            try {
                if (isRegisterMode) {
                    const cred = await createUserWithEmailAndPassword(auth, email, pass);
                    await sendEmailVerification(cred.user);
                    await saveUserData(cred.user);
                    alert("E-mail de verificação enviado!");
                } else {
                    const cred = await signInWithEmailAndPassword(auth, email, pass);
                    if (!cred.user.emailVerified) return alert("Por favor, verifique seu e-mail!");
                }
            } catch (e) { alert(e.message); }
        };

        document.getElementById('btn-google').onclick = async () => {
            try {
                const provider = new GoogleAuthProvider();
                const result = await signInWithPopup(auth, provider);
                await saveUserData(result.user);
            } catch (e) { console.error(e); }
        };

        document.getElementById('btn-facebook').onclick = async () => {
            try {
                const provider = new FacebookAuthProvider();
                const result = await signInWithPopup(auth, provider);
                await saveUserData(result.user);
            } catch (e) { console.error(e); }
        };

        window.processAIChat = async () => {
            const input = document.getElementById('ai-input');
            const log = document.getElementById('chat-log');
            const text = input.value.trim();
            if (!text) return;

            log.innerHTML += `<div class="message message-user">${text}</div>`;
            input.value = '';
            log.scrollTop = log.scrollHeight;

            try {
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${CONFIG.GEMINI_KEY}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ contents: [{ parts: [{ text }] }] })
                });
                const data = await response.json();
                const aiText = data.candidates[0].content.parts[0].text;
                log.innerHTML += `<div class="message message-ai">${aiText.replace(/\n/g, '<br>')}</div>`;
            } catch (e) {
                log.innerHTML += `<div class="message message-ai" style="color:var(--error-ui)">Falha na requisição. Reinicie o terminal.</div>`;
            }
            log.scrollTop = log.scrollHeight;
        };

        window.handleChatEnter = (e) => { if (e.key === 'Enter') window.processAIChat(); };
        window.handleLogout = () => signOut(auth);
    </script>
</body>
</html>
