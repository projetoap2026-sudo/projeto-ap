<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <link rel="manifest" href="manifest.json">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AP — Aprendizado com IA</title>
  <style>
    :root {
      color-scheme: light dark;
      --bg: #ffffff;
      --card: #f4f4f4;
      --text: #111111;
      --accent: #4f46e5;
      --border: rgba(0,0,0,0.08);
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #0f1115;
        --card: #181b22;
        --text: #f5f5f5;
        --accent: #7c6cff;
        --border: rgba(255,255,255,0.08);
      }
    }

    * { margin: 0; padding: 0; box-sizing: border-box; font-family: Arial, sans-serif; }
    body { background: var(--bg); color: var(--text); min-height: 100vh; overflow-x: hidden; }

    header {
      display: flex; justify-content: space-between; align-items: center;
      padding: 20px 40px; border-bottom: 1px solid var(--border);
      position: sticky; top: 0; background: var(--bg); backdrop-filter: blur(12px); z-index: 100;
    }
    .logo { text-shadow: 0 0 12px var(--accent); font-size: 28px; font-weight: bold; color: var(--accent); cursor: pointer; }
    nav button {
      background: transparent; border: none; color: var(--text); font-size: 16px;
      font-weight: 500; cursor: pointer; margin-left: 20px; transition: 0.2s ease;
    }
    nav button:hover { color: var(--accent); }
    .theme-toggle { border: 1px solid var(--border); padding: 8px 12px; border-radius: 12px; }

    .view { display: none; animation: fadeIn 0.5s ease; padding: 40px 20px; max-width: 1200px; margin: auto; min-height: 80vh; }
    .view.active { display: block; }
    
    @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

    /* Layout do Chat */
    .chat-box {
      max-width: 800px; margin: 20px auto; background: var(--card); border-radius: 20px;
      border: 1px solid var(--border); display: flex; flex-direction: column; height: 450px;
    }
    #chat-log { flex: 1; padding: 20px; overflow-y: auto; display: flex; flex-direction: column; gap: 12px; }
    .bubble { padding: 12px 16px; border-radius: 15px; max-width: 85%; font-size: 15px; line-height: 1.4; }
    .user-b { align-self: flex-end; background: var(--accent); color: white; }
    .ai-b { align-self: flex-start; background: var(--bg); border: 1px solid var(--border); white-space: pre-wrap; }
    
    .input-row { display: flex; padding: 15px; border-top: 1px solid var(--border); gap: 10px; }
    #input-ia { flex: 1; padding: 12px; border-radius: 12px; border: 1px solid var(--border); background: var(--bg); color: var(--text); }
    .send-btn { padding: 0 20px; background: var(--accent); color: white; border: none; border-radius: 12px; cursor: pointer; font-weight: bold; }

    .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 20px; margin-top: 30px; }
    .card { background: var(--card); border: 1px solid var(--border); border-radius: 20px; padding: 25px; transition: 0.2s; cursor: pointer; }
    .card:hover { transform: translateY(-5px); box-shadow: 0 0 20px rgba(124,108,255,0.18); }

    .login-box { max-width: 400px; margin: 40px auto; background: var(--card); padding: 35px; border-radius: 24px; border: 1px solid var(--border); text-align: center; }
    .terms-box { display: flex; align-items: center; gap: 10px; font-size: 13px; opacity: 0.8; margin: 20px 0; cursor: pointer; }
    .google-btn { width: 100%; padding: 12px; border: 1px solid var(--border); border-radius: 12px; background: var(--bg); color: var(--text); cursor: pointer; font-weight: bold; }

    .splash-screen { position: fixed; inset: 0; background: var(--bg); display: flex; justify-content: center; align-items: center; z-index: 9999; }
    .ap-animation { font-size: 90px; font-weight: bold; color: var(--accent); text-shadow: 0 0 30px var(--accent); animation: zoomOutFade 2.5s forwards; }

    @keyframes zoomOutFade {
      0% { transform: scale(1); opacity: 1; }
      100% { transform: scale(40); opacity: 0; visibility: hidden; }
    }

    @media (max-width: 600px) {
      .grid { grid-template-columns: 1fr; }
      .ap-animation { font-size: 60px; }
    }
  </style>
</head>
<body>

  <div class="splash-screen" id="splash">
    <div class="ap-animation">AP</div>
  </div>

  <header>
    <div class="logo" onclick="switchView('home')">AP</div>
    <nav>
      <button onclick="switchView('dashboard')">Painel de IA</button>
      <button onclick="switchView('login')">Login</button>
      <button class="theme-toggle" onclick="toggleTheme()">🌙 Tema</button>
    </nav>
  </header>

  <div id="home" class="view">
    <div style="text-align:center; padding-top:100px;">
      <h1>Aprendizado com IA</h1>
      <button class="send-btn" style="height:50px; margin-top:20px;" onclick="switchView('login')">Começar Agora</button>
    </div>
  </div>

  <div id="login" class="view active">
    <div class="login-box">
      <h2>Entrar no AP</h2>
      <button class="google-btn" onclick="loginGoogle()">🌐 Entrar com Google</button>
      <label class="terms-box">
        <input type="checkbox" id="t-check"> Aceito os Termos de Uso.
      </label>
    </div>
  </div>

  <div id="dashboard" class="view">
    <h2 style="text-align:center;">Tutor Inteligente AP</h2>
    
    <div class="chat-box">
      <div id="chat-log">
        <div class="bubble ai-b">Olá! Sou sua IA de estudos. Como posso te ajudar hoje?</div>
      </div>
      <div class="input-row">
        <input type="text" id="input-ia" placeholder="Pergunte qualquer coisa...">
        <button class="send-btn" onclick="enviarChat()">Enviar</button>
      </div>
    </div>

    <div class="grid">
      <div class="card" onclick="document.getElementById('input-ia').value='Me ajude com Programação'"><h3>💻 Programação</h3></div>
      <div class="card" onclick="document.getElementById('input-ia').value='Dicas para o ENEM'"><h3>📝 ENEM</h3></div>
      <div class="card" onclick="document.getElementById('input-ia').value='O que é Cybersecurity?'"><h3>🛡️ Segurança</h3></div>
    </div>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.11.0/firebase-app.js";
    import { getAuth, signInWithPopup, GoogleAuthProvider } from "https://www.gstatic.com/firebasejs/10.11.0/firebase-auth.js";
    import { getDatabase, ref, set, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.11.0/firebase-database.js";

    const firebaseConfig = {
      apiKey: "AIzaSyA34ErbiFCDDSiLT4YuWZxa6nDESwvgAgk",
      authDomain: "ap-x-c062e.firebaseapp.com",
      databaseURL: "https://ap-x-c062e-default-rtdb.firebaseio.com",
      projectId: "ap-x-c062e",
      storageBucket: "ap-x-c062e.firebasestorage.app",
      messagingSenderId: "1069658318640",
      appId: "1:1069658318640:web:0c0798a171d838a6c34af5"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const database = getDatabase(app);
    const provider = new GoogleAuthProvider();

    // Sua Chave do Gemini do print
    const GEMINI_KEY = "AIzaSyCayMIED-wA52Sh2UKIKDo8acJHX1GjBfQ";

    window.loginGoogle = async function() {
      if (!document.getElementById('t-check').checked) return alert("Aceite os termos.");
      try {
        const res = await signInWithPopup(auth, provider);
        await set(ref(database, 'alunos/' + res.user.uid), {
          nome: res.user.displayName,
          email: res.user.email,
          acesso: serverTimestamp()
        });
        switchView('dashboard');
      } catch (err) { console.error(err); }
    };

    window.enviarChat = async function() {
      const box = document.getElementById('input-ia');
      const log = document.getElementById('chat-log');
      const msg = box.value;
      if (!msg) return;

      log.innerHTML += `<div class="bubble user-b">${msg}</div>`;
      box.value = "";
      log.scrollTop = log.scrollHeight;

      try {
        const resp = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${GEMINI_KEY}`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ contents: [{ parts: [{ text: `Você é o tutor do sistema AP. Responda de forma didática: ${msg}` }] }] })
        });
        const data = await resp.json();
        const texto = data.candidates[0].content.parts[0].text;
        log.innerHTML += `<div class="bubble ai-b">${texto}</div>`;
      } catch (e) {
        log.innerHTML += `<div class="bubble ai-b">Erro ao conectar. Tente novamente.</div>`;
      }
      log.scrollTop = log.scrollHeight;
    };
  </script>

  <script>
    window.addEventListener('load', () => { setTimeout(() => { document.getElementById('splash').style.display='none'; switchView('login'); }, 2500); });
    function switchView(id) { document.querySelectorAll('.view').forEach(v => v.classList.remove('active')); document.getElementById(id).classList.add('active'); }
    function toggleTheme() { 
      const b = document.body; b.dataset.theme = b.dataset.theme === 'dark' ? 'light' : 'dark';
      document.documentElement.style.setProperty('--bg', b.dataset.theme === 'dark' ? '#0f1115' : '#ffffff');
      document.documentElement.style.setProperty('--text', b.dataset.theme === 'dark' ? '#f5f5f5' : '#111111');
      document.documentElement.style.setProperty('--card', b.dataset.theme === 'dark' ? '#181b22' : '#f4f4f4');
    }
  </script>
</body>
</html>
