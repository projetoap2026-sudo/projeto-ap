<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AP — Aprendizado com IA</title>
  <style>
    :root {
      color-scheme: light dark;
      --bg: #0f1115;
      --card: #181b22;
      --text: #f5f5f5;
      --accent: #7c6cff;
      --border: rgba(255,255,255,0.08);
      --error: #ff4d4d;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; font-family: sans-serif; transition: 0.3s; }
    body { background: var(--bg); color: var(--text); }
    
    .view { display: none; padding: 40px 20px; max-width: 500px; margin: auto; }
    .view.active { display: block; }

    .card { background: var(--card); padding: 30px; border-radius: 20px; border: 1px solid var(--border); }
    input, select { 
        width: 100%; padding: 12px; margin: 10px 0; border-radius: 10px; 
        border: 1px solid var(--border); background: #000; color: #fff; 
    }
    button { 
        width: 100%; padding: 14px; border-radius: 10px; border: none; 
        background: var(--accent); color: #fff; font-weight: bold; cursor: pointer; margin-top: 10px;
    }
    .secondary-btn { background: transparent; border: 1px solid var(--border); color: var(--text); font-size: 13px; }
    
    #dashboard { max-width: 1000px; }
    .chat-box { background: var(--card); height: 60vh; border-radius: 20px; display: flex; flex-direction: column; overflow: hidden; }
    #chat-log { flex: 1; padding: 20px; overflow-y: auto; }
    .bubble { padding: 10px 15px; border-radius: 15px; margin: 5px 0; max-width: 80%; }
    .user-b { background: var(--accent); align-self: flex-end; margin-left: auto; }
    .ai-b { background: var(--bg); border: 1px solid var(--border); }
  </style>
</head>
<body>

  <div id="home" class="view active">
    <div style="text-align: center; margin-top: 20vh;">
      <h1>Bem-vindo ao AP</h1>
      <button onclick="switchView('login-email')">Entrar com E-mail</button>
      <button class="secondary-btn" onclick="switchView('registro')">Criar Nova Conta</button>
    </div>
  </div>

  <div id="login-email" class="view">
    <div class="card">
      <h2>Login</h2>
      <input type="email" id="login-user" placeholder="Seu e-mail">
      <input type="password" id="login-pass" placeholder="Sua senha">
      <button id="btn-entrar">Entrar</button>
      <button class="secondary-btn" onclick="switchView('home')">Voltar</button>
    </div>
  </div>

  <div id="registro" class="view">
    <div class="card">
      <h2>Cadastro</h2>
      <input type="text" id="reg-nome" placeholder="Nome Completo">
      <input type="email" id="reg-email" placeholder="E-mail">
      
      <div style="display: flex; gap: 10px;">
        <input type="number" id="reg-idade" placeholder="Idade">
        <select id="reg-sexo">
            <option value="">Sexo</option>
            <option value="Masculino">Masculino</option>
            <option value="Feminino">Feminino</option>
            <option value="Outro">Outro</option>
        </select>
      </div>

      <input type="password" id="reg-pass" placeholder="Criar Senha">
      <input type="password" id="reg-pass-conf" placeholder="Confirmar Senha">
      
      <button id="btn-registrar">Criar Conta e Verificar E-mail</button>
      <button class="secondary-btn" onclick="switchView('home')">Já tenho conta</button>
    </div>
  </div>

  <div id="dashboard" class="view">
    <div class="chat-box">
      <div id="chat-log"></div>
      <div style="padding: 15px; display: flex; gap: 10px; border-top: 1px solid var(--border);">
        <input type="text" id="user-prompt" placeholder="Sua dúvida...">
        <button onclick="perguntarIA()" style="width: auto;">Enviar</button>
      </div>
    </div>
    <button onclick="sair()" class="secondary-btn" style="margin-top: 20px;">Sair</button>
  </div>

  <script type="module">
    import { CONFIG } from './env.js';
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.11.0/firebase-app.js";
    import { 
        getAuth, 
        createUserWithEmailAndPassword, 
        signInWithEmailAndPassword, 
        sendEmailVerification, 
        onAuthStateChanged,
        signOut 
    } from "https://www.gstatic.com/firebasejs/10.11.0/firebase-auth.js";
    import { getDatabase, ref, set } from "https://www.gstatic.com/firebasejs/10.11.0/firebase-database.js";

    const firebaseConfig = {
      apiKey: CONFIG.FIREBASE_KEY,
      authDomain: "ap-x-c062e.firebaseapp.com",
      databaseURL: "https://ap-x-c062e-default-rtdb.firebaseio.com",
      projectId: "ap-x-c062e",
      storageBucket: "ap-x-c062e.firebasestorage.app",
      messagingSenderId: "1069658318640",
      appId: "1:1069658318640:web:0c0798a171d838a6c34af5"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getDatabase(app);

    document.getElementById('btn-registrar').onclick = async () => {
        const nome = document.getElementById('reg-nome').value;
        const email = document.getElementById('reg-email').value;
        const pass = document.getElementById('reg-pass').value;
        const conf = document.getElementById('reg-pass-conf').value;
        const idade = document.getElementById('reg-idade').value;
        const sexo = document.getElementById('reg-sexo').value;

        if(pass !== conf) return alert("As senhas não coincidem!");
        if(!idade || !sexo) return alert("Preencha idade e sexo!");

        try {
            const userCredential = await createUserWithEmailAndPassword(auth, email, pass);
            const user = userCredential.user;

            await sendEmailVerification(user);
            alert("E-mail de verificação enviado! Verifique sua caixa de entrada.");

            await set(ref(db, 'usuarios/' + user.uid), {
                nome, idade, sexo, email, verificado: false
            });

            switchView('home');
        } catch (e) { alert("Erro: " + e.message); }
    };

    document.getElementById('btn-entrar').onclick = async () => {
        const email = document.getElementById('login-user').value;
        const pass = document.getElementById('login-pass').value;
        try {
            const userCred = await signInWithEmailAndPassword(auth, email, pass);
            if(!userCred.user.emailVerified) {
                alert("Por favor, verifique seu e-mail antes de entrar!");
                return;
            }
            switchView('dashboard');
        } catch (e) { alert("Dados incorretos!"); }
    };

    window.perguntarIA = async () => {
        const p = document.getElementById('user-prompt');
        const log = document.getElementById('chat-log');
        const msg = p.value;
        if(!msg) return;

        log.innerHTML += `<div class="bubble user-b">${msg}</div>`;
        p.value = "";

        try {
            const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${CONFIG.GEMINI_KEY}`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ contents: [{ parts: [{ text: msg }] }] })
            });
            const data = await res.json();
            const responseText = data.candidates[0].content.parts[0].text;
            log.innerHTML += `<div class="bubble ai-b">${responseText.replace(/\n/g, '<br>')}</div>`;
        } catch (e) { log.innerHTML += `<div class="bubble ai-b" style="color:red">Erro na conexão.</div>`; }
        log.scrollTop = log.scrollHeight;
    };

    onAuthStateChanged(auth, (user) => {
        if (user && user.emailVerified) switchView('dashboard');
    });

    window.sair = () => signOut(auth).then(() => location.reload());
    window.switchView = (id) => {
        document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
        document.getElementById(id).classList.add('active');
    };
  </script>
</body>
</html>
